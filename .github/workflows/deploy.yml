name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System deps required by Puppeteer / Chromium ─────────────────────
      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxss1 libnss3 libatk-bridge2.0-0 \
            libgtk-3-0 libgbm1 libasound2 \
            fonts-liberation libappindicator3-1 xdg-utils

      # ── 3. Node + npm cache ──────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Puppeteer browser binary cache ────────────────────────────────────
      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # ── 5. Install ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Build (Vite + vite-plugin-prerender / Puppeteer) ─────────────────
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SITE_URL: https://off-plan-projects.com

      # ── 7. Configure Pages ───────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # ── 8. Upload artifact ───────────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      # ── 9. Deploy ────────────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
