name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System deps required by Puppeteer / Chromium ─────────────────────
      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update
          # libxss1 and libasound2 exist on Ubuntu 22.04; listed explicitly for clarity.
          # If a future runner image drops them, the --ignore-missing flag prevents a hard stop.
          sudo apt-get install -y --no-install-recommends \
            libxss1 libnss3 libatk-bridge2.0-0 \
            libgtk-3-0 libgbm1 libasound2 \
            fonts-liberation libappindicator3-1 xdg-utils

      # ── 3. Node + npm cache ──────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Puppeteer browser binary cache (speeds up subsequent runs) ────────
      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # ── 5. Install ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Build (Vite + vite-plugin-prerender / Puppeteer) ─────────────────
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SITE_URL: https://off-plan-projects.com

      # ── 7. Vercel: pull project settings ────────────────────────────────────
      # Writes .vercel/project.json so --prebuilt deploy knows the target project.
      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 8. Assemble Vercel prebuilt output ───────────────────────────────────
      # Vercel's prebuilt deploy expects .vercel/output/static/ + config.json.
      # We copy dist/ (already fully prerendered) so Vercel just serves it;
      # no second build happens on Vercel's side.
      - name: Assemble Vercel prebuilt output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          printf '%s\n' '{
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }' > .vercel/output/config.json

      # ── 9. Deploy ────────────────────────────────────────────────────────────
      - name: Deploy to Vercel (production)
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
